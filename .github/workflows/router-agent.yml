name: Router Agent — inbox classifier

on:
  push:
    paths:
      - "inbox/**/*.md"
  workflow_dispatch:
    inputs:
      file:
        description: "Файл для классификации"
        required: false

permissions:
  contents: write

jobs:
  route:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1}

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - run: pip install requests

      - name: Find and route inbox file
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INPUT_FILE: ${{ github.event.inputs.file }}
        run: python3 scripts/router_agent.py

      - name: Commit routing result
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            CATEGORY=$(cat /tmp/router_category.txt 2>/dev/null || echo "routed")
            git commit -m "Router: classified → ${CATEGORY} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

name: Sentinel — final gate

on:
  workflow_dispatch:
    inputs:
      qa_status:
        description: "Статус QA (PASS/FAIL)"
        required: false
        default: "PASS"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - run: pip install requests

      - name: Evaluate and act
        env:
          QA_STATUS: ${{ github.event.inputs.qa_status }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from pathlib import Path
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          date_str = now.strftime("%Y-%m-%d %H:%M UTC")
          qa_status = os.environ.get("QA_STATUS", "PASS")

          # Читаем последние QA и Review отчёты
          qa_reports = sorted(Path("reports/qa").glob("*.md"), reverse=True) if Path("reports/qa").exists() else []
          review_reports = sorted(Path("reports/reviews").glob("*.md"), reverse=True) if Path("reports/reviews").exists() else []

          qa_content = qa_reports[0].read_text(encoding="utf-8")[:1000] if qa_reports else "Нет QA отчёта"
          review_content = review_reports[0].read_text(encoding="utf-8")[:1000] if review_reports else "Нет ревью"

          is_pass = qa_status.upper() == "PASS"

          if is_pass:
              status_icon = "✅"
              status_text = "ВСЕ ПРОВЕРКИ ПРОШЛИ — ДЕПЛОЙ РАЗРЕШЁН"
              action_text = "Изменения можно деплоить на production."
          else:
              status_icon = "❌"
              status_text = "КРИТИЧЕСКИЕ ОШИБКИ — ДЕПЛОЙ ЗАБЛОКИРОВАН"
              action_text = "Необходимо исправить ошибки перед деплоем."

          # Создаём итоговый Sentinel отчёт
          Path("reports/errors").mkdir(parents=True, exist_ok=True)
          day = now.strftime("%Y-%m-%d")

          report = f"""---
          title: Sentinel Report {day}
          date: {date_str}
          qa_status: {qa_status}
          verdict: {"APPROVED" if is_pass else "BLOCKED"}
          type: sentinel
          ---

          # {status_icon} Sentinel — {status_text}

          **Дата:** {date_str}
          **QA Status:** {qa_status}
          **Вердикт:** {"🟢 APPROVED" if is_pass else "🔴 BLOCKED"}

          ## Действие

          {action_text}

          ## QA Summary

          {qa_content[:500]}

          ## Review Summary

          {review_content[:500]}
          """

          import textwrap
          report = textwrap.dedent(report)

          if is_pass:
              report_path = Path(f"reports/sentinel-approved-{day}.md")
          else:
              report_path = Path(f"reports/errors/sentinel-blocked-{day}.md")

          report_path.write_text(report, encoding="utf-8")
          Path("/tmp/sentinel_verdict.txt").write_text("APPROVED" if is_pass else "BLOCKED")

          print(f"{status_icon} Sentinel verdict: {'APPROVED' if is_pass else 'BLOCKED'}")
          print(f"📄 Report: {report_path}")
          PYEOF

      - name: Create GitHub Issue if blocked
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QA_STATUS: ${{ github.event.inputs.qa_status }}
        run: |
          VERDICT=$(cat /tmp/sentinel_verdict.txt 2>/dev/null || echo "UNKNOWN")
          if [ "$VERDICT" = "BLOCKED" ]; then
            gh issue create \
              --title "🚨 Sentinel BLOCKED: QA/Review failed $(date -u '+%Y-%m-%d')" \
              --body "QA Status: $QA_STATUS. Проверь reports/errors/ для деталей. [skip ci]" \
              --label "bug" \
              2>/dev/null || echo "Issue creation skipped (no permissions or already exists)"
          fi

      - name: Commit sentinel report
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            VERDICT=$(cat /tmp/sentinel_verdict.txt 2>/dev/null || echo "unknown")
            git commit -m "Sentinel: ${VERDICT} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

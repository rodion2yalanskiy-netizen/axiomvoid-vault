name: Memory Agent — update session state

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 5}

      - name: Update memory/session-state.md
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          DAY=$(date -u '+%Y-%m-%d')

          # Считаем статистику
          TOTAL_TASKS=$(ls "🤖 AI Задачи/"*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          COMPLETED=$(ls "🤖 AI Задачи/"*.md 2>/dev/null | xargs grep -l "^status: completed" 2>/dev/null | wc -l | tr -d ' ')
          REPORTS=$(ls "✅ Выполнено Claude/"*.md 2>/dev/null | wc -l | tr -d ' ')
          INBOX=$(ls inbox/*.md 2>/dev/null | wc -l | tr -d ' ')
          TASKS=$(ls tasks/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')

          # Последние коммиты
          RECENT=$(git log --oneline -5 --no-merges 2>/dev/null || echo "")

          mkdir -p memory

          cat > "memory/session-state.md" << STATEOF
          ---
          title: Session State
          updated: $DATE
          type: memory
          auto: true
          ---

          # 🔄 Session State

          **Обновлено:** $DATE
          **Ветка:** main

          ## 📊 Статистика vault'а

          | Метрика | Значение |
          |---------|---------|
          | AI Задачи (всего) | $TOTAL_TASKS |
          | Завершено | $COMPLETED |
          | Отчёты в ✅ | $REPORTS |
          | Inbox | $INBOX |
          | Tasks | $TASKS |

          ## 🕐 Последние коммиты

          \`\`\`
          $RECENT
          \`\`\`

          ## 📋 Последние отчёты

          $(ls -t "✅ Выполнено Claude/"*.md 2>/dev/null | head -5 | while read f; do echo "- $(basename "$f" .md)"; done)

          ## ⏳ Незавершённые задачи AI Задачи

          $(while IFS= read -r f; do
            [ -f "$f" ] || continue
            [[ "$(basename "$f")" == "README"* ]] && continue
            STATUS=$(grep -m1 "^status:" "$f" 2>/dev/null | awk '{print $2}')
            [[ "$STATUS" == "completed" || "$STATUS" == "archived" || "$STATUS" == "skip" ]] && continue
            echo "- [ ] $(basename "$f" .md)"
          done < <(ls -t "🤖 AI Задачи/"*.md 2>/dev/null))
          STATEOF

          echo "✅ memory/session-state.md обновлён"

      - name: Commit memory update
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add memory/session-state.md
          if git diff --staged --quiet; then
            echo "No memory changes"
          else
            git commit -m "Memory: session state updated [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

name: AI Agent Pipeline

on:
  push:
    paths:
      - "* AI */*.md"
  workflow_dispatch:
    inputs:
      task_file:
        description: "Path to task file (relative to repo root)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  process-task:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Find pending task
        id: find_task
        env:
          INPUT_FILE: ${{ github.event.inputs.task_file }}
        run: |
          if [ -n "$INPUT_FILE" ]; then
            echo "task_file=$INPUT_FILE" >> $GITHUB_OUTPUT
            echo "Found (manual): $INPUT_FILE"
            exit 0
          fi

          # Ищем задачи по дате изменения (новые — первыми)
          # ls -t сортирует по времени, корректно работает с пробелами и Unicode
          TASK=""
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            [[ "$f" == *"README"* ]] && continue
            STATUS=$(grep -m1 "^status:" "$f" 2>/dev/null | awk '{print $2}')
            [[ "$STATUS" == "completed" ]]  && continue
            [[ "$STATUS" == "archived" ]]   && continue
            [[ "$STATUS" == "processing" ]] && continue
            [[ "$STATUS" == "skip" ]]       && continue
            TASK="$f"
            break
          done < <(ls -t *AI*/*.md 2>/dev/null)

          if [ -z "$TASK" ]; then
            echo "No pending tasks found"
            echo "task_file=" >> $GITHUB_OUTPUT
          else
            STATUS=$(grep -m1 "^status:" "$TASK" 2>/dev/null | awk '{print $2}')
            echo "task_file=$TASK" >> $GITHUB_OUTPUT
            echo "Found: $TASK (status: ${STATUS:-none})"
          fi

      - name: Detect task tool
        id: detect_tool
        if: steps.find_task.outputs.task_file != ''
        env:
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: |
          # Читаем явно указанный tool из frontmatter
          TOOL=$(grep -m1 "^tool:" "$TASK_FILE" 2>/dev/null | awk '{print $2}')

          # Auto-detect: если tool не указан, process_task.py сам определит
          # Здесь мы только проверяем явные значения code/antigravity для
          # правильного выбора шага Actions
          if [ -z "$TOOL" ]; then
            # Проверяем паттерны code-задач в содержимом файла
            CONTENT=$(awk '/^---/{n++; if(n==2){found=1; next}} found{print}' "$TASK_FILE")
            if echo "$CONTENT" | grep -qiE "^\s*claude\s+|~/|/Users/|git (commit|push)|создай файл|исправ[ьи] "; then
              TOOL="code"
              echo "🔍 Auto-detected: code (content pattern match)"
            else
              TOOL="openrouter"
            fi
          fi

          echo "tool=$TOOL" >> $GITHUB_OUTPUT
          echo "✅ Tool: $TOOL (task: $TASK_FILE)"

      - name: Process task (cloud AI)
        if: |
          steps.find_task.outputs.task_file != '' &&
          steps.detect_tool.outputs.tool != 'code' &&
          steps.detect_tool.outputs.tool != 'antigravity'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY:   ${{ secrets.TOGETHER_API_KEY }}
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: python scripts/process_task.py

      - name: Delegate local task (code/antigravity)
        if: |
          steps.find_task.outputs.task_file != '' &&
          (steps.detect_tool.outputs.tool == 'code' ||
           steps.detect_tool.outputs.tool == 'antigravity')
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: python scripts/process_task.py

      - name: Save report to vault
        if: steps.find_task.outputs.task_file != ''
        run: python scripts/save_to_vault.py

      - name: Mark task as completed
        if: steps.find_task.outputs.task_file != ''
        env:
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: |
          if [ -f "$TASK_FILE" ]; then
            if grep -q "^status:" "$TASK_FILE"; then
              sed -i 's/^status: .*/status: completed/' "$TASK_FILE"
            else
              printf -- "---\nstatus: completed\ndate: %s\n---\n\n" "$(date +%Y-%m-%d)" | cat - "$TASK_FILE" > /tmp/_task_tmp.md
              mv /tmp/_task_tmp.md "$TASK_FILE"
            fi
            echo "Marked as completed: $TASK_FILE"
          fi

      - name: Commit and push report
        if: steps.find_task.outputs.task_file != ''
        env:
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TASK_NAME=$(cat /tmp/agent_task_name.txt 2>/dev/null || echo "task")
            git commit -m "Agent report: ${TASK_NAME} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

name: AI Agent Pipeline

on:
  push:
    paths:
      - "* AI */*.md"
  workflow_dispatch:
    inputs:
      task_file:
        description: "Path to task file (relative to repo root)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  process-task:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Find pending task
        id: find_task
        env:
          INPUT_FILE: ${{ github.event.inputs.task_file }}
        run: |
          if [ -n "$INPUT_FILE" ]; then
            echo "task_file=$INPUT_FILE" >> $GITHUB_OUTPUT
            echo "Found (manual): $INPUT_FILE"
            exit 0
          fi
          # Ищем файл с status: pending в frontmatter (надёжный способ)
          TASK=""
          for f in *AI*/*.md; do
            [ -f "$f" ] || continue
            [[ "$f" == *"README"* ]] && continue
            STATUS=$(grep -m1 "^status:" "$f" 2>/dev/null | awk '{print $2}')
            if [ "$STATUS" = "pending" ]; then
              TASK="$f"
              break
            fi
          done
          if [ -z "$TASK" ]; then
            echo "No pending tasks found"
            echo "task_file=" >> $GITHUB_OUTPUT
          else
            echo "task_file=$TASK" >> $GITHUB_OUTPUT
            echo "Found (pending): $TASK"
          fi

      - name: Run AI agent (OpenRouter)
        if: steps.find_task.outputs.task_file != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: python scripts/process_task.py

      - name: Save report to vault
        if: steps.find_task.outputs.task_file != ''
        run: python scripts/save_to_vault.py

      - name: Mark task as completed
        if: steps.find_task.outputs.task_file != ''
        env:
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: |
          if [ -f "$TASK_FILE" ]; then
            sed -i 's/^status: pending/status: completed/' "$TASK_FILE"
            echo "Marked as completed: $TASK_FILE"
          fi

      - name: Commit and push report
        if: steps.find_task.outputs.task_file != ''
        env:
          TASK_FILE: ${{ steps.find_task.outputs.task_file }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add "✅ Выполнено Claude/" "$TASK_FILE" 2>/dev/null || true
          git add *Выполнено*/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TASK_NAME=$(cat /tmp/agent_task_name.txt 2>/dev/null || echo "task")
            git commit -m "Agent report: ${TASK_NAME} [skip ci]"
            git push origin main
          fi
